<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechFlow - Welcome</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }

        header nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        header nav ul li {
            display: inline;
            margin-right: 20px;
        }

        header nav ul li a {
            color: white;
            text-decoration: none;
        }

        section {
            padding: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="home">
        <h1>Welcome to TechFlow</h1>
        <p>Your partner in technological innovation.</p>
        <button id="learnMore">Learn More</button>
    </section>
    <section id="about" style="display:none;">
        <h2>About Us</h2>
        <p>TechFlow is dedicated to providing cutting-edge solutions for businesses and individuals.</p>
        <button id="backToHome">Back to Home</button>
    </section>
    <section id="contact" style="display:none;">
        <h2>Get in Touch</h2>
        <p>Email: contact@techflow.com</p>
        <button id="backToHomeFromContact">Back to Home</button>
    </section>

    <script>
        document.getElementById('learnMore').addEventListener('click', function() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('about').style.display = 'block';
        });

        document.getElementById('backToHome').addEventListener('click', function() {
            document.getElementById('about').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        });

        document.querySelector('header nav ul li a[href="#contact"]').addEventListener('click', function(event) {
            event.preventDefault();
            document.getElementById('home').style.display = 'none';
            document.getElementById('contact').style.display = 'block';
        });

        document.getElementById('backToHomeFromContact').addEventListener('click', function() {
            document.getElementById('contact').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        });

        document.querySelector('header nav ul li a[href="#home"]').addEventListener('click', function(event) {
            event.preventDefault();
            document.getElementById('about').style.display = 'none';
            document.getElementById('contact').style.display = 'none';
            document.getElementById('home').style.display = 'block';
        });

        document.querySelector('header nav ul li a[href="#about"]').addEventListener('click', function(event) {
            event.preventDefault();
            document.getElementById('home').style.display = 'none';
            document.getElementById('contact').style.display = 'none';ṇ
            document.getElementById('about').style.display = 'block';
        });
    </script>
</body>
</html>
